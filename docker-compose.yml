services:
  frontend:
    build: ./frontEnd
    ports:
      - "9000:9000"
    volumes:
      - ./frontEnd:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build: ./backEnd
    ports:
      - "3000:3000"
    volumes:
      - ./backEnd:/app
      - /app/node_modules
    environment:
      DB_HOST: banco
      DB_USER: postgres
      DB_PASS: senha123
      DB_NAME: meudb
      DB_PORT: 5432
    depends_on:
      - banco

  banco:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: senha123
      POSTGRES_DB: meudb
    volumes:
      - dados_postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  dados_postgres: